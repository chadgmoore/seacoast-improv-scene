name: Rebuild Improv Listings

on:
  schedule:
    - cron: '0 6 * * *'   # runs daily at 6am UTC (2am ET)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Generate HTML
        run: |
          sed -i 's|/mnt/user-data/outputs/index.html|index.html|g' generate_html.py
          sed -i 's|/home/claude/events.json|events.json|g' generate_html.py
          python generate_html.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html events.json
          git diff --staged --quiet || git commit -m "Auto-rebuild $(date -u '+%Y-%m-%d')"
          git push

      - name: Trigger Netlify deploy
        run: curl -X POST ${{ secrets.NETLIFY_BUILD_HOOK }}
